<!DOCTYPE html>
<html lang='es'>
<head>

<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Solicitar documentación — Nuevo prototipo Reclamos</title>
<link rel='preconnect' href='https://fonts.googleapis.com'>
<link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
<link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap'>
<link rel='stylesheet' href='./styles.css'>
<link rel='stylesheet' href='./proto.css'>
<script crossorigin src='https://unpkg.com/react@18.3.1/umd/react.development.js' integrity='sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L'></script>
<script crossorigin src='https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js' integrity='sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm'></script>
<script src='https://unpkg.com/@babel/standalone@7.29.0/babel.min.js' integrity='sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y' crossorigin='anonymous'></script>
<script src='./_ds_bundle.js'></script>
<script src='./_ds_bundle_ext.js'></script>
<script src='./_boot.js'></script>
<script src='./_appkit.js'></script>
</head>
<body>
<div id='root'></div>
<script type='text/babel'>
const DS = window.AmparoDesignSystem_70b626;
const { Drawer, Textarea, Button, Badge } = DS;
const { Icon, AgentShell, Canvas, mount } = window.Proto;

const CASO = { name: 'Mónica Alsina', id: 'SIN-2026-00142' };
const HIST = [
  { text: 'Presupuesto del taller oficial y detalle de repuestos.', fecha: '27/06/2026', estado: 'respondido' },
  { text: 'Constancia de cobertura vigente al día del siniestro.', fecha: '01/07/2026', estado: 'pendiente' }
];
const DRAFT = 'Necesito el acta policial de la denuncia y dos fotos del daño visible del vehículo (frente y lateral). Si tenés el presupuesto firmado por el taller, sumalo también.';

function PlaceholderCard({ h }) {
  return <div style={{ background: 'var(--bg-surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-sm)', height: h }} />;
}

function BackdropFicha() {
  return <AgentShell activeId='casos' title='Ficha del caso'>
    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '18px' }}>
      <h2 style={{ margin: 0, fontFamily: 'var(--font-sans)', fontSize: 'var(--text-h2-size)', fontWeight: 700, letterSpacing: '-0.02em', color: 'var(--text-primary)' }}>{CASO.name}</h2>
      <Badge variant='expediente-armado' />
    </div>
    <div style={{ marginBottom: '20px' }}><PlaceholderCard h='96px' /></div>
    <div style={{ display: 'grid', gridTemplateColumns: '1.9fr 1fr', gap: '20px' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '20px' }}><PlaceholderCard h='150px' /><PlaceholderCard h='150px' /></div>
      <PlaceholderCard h='220px' />
    </div>
  </AgentShell>;
}

function Historial({ items }) {
  if (!items.length) {
    return <div style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '13px 14px', background: 'var(--bg-inset)', border: '1px dashed var(--border-strong)', borderRadius: 'var(--radius-md)' }}>
      <span style={{ color: 'var(--text-tertiary)', display: 'flex', flexShrink: 0 }}><Icon name='send' size={16} /></span>
      <span style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--text-body-sm-size)', color: 'var(--text-secondary)', lineHeight: 1.45 }}>Este es el primer pedido de documentación para este caso.</span>
    </div>;
  }
  return <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
    {items.map((p, i) => <div key={i} style={{ padding: '12px 13px', border: '1px solid var(--border)', borderRadius: 'var(--radius-md)', background: 'var(--bg-inset)' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '10px', marginBottom: '6px' }}>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', color: 'var(--text-tertiary)' }}>Enviado {p.fecha}</span>
        <Badge variant={p.estado === 'respondido' ? 'respondido' : 'pendiente'} />
      </div>
      <div style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--text-body-sm-size)', color: 'var(--text-primary)', lineHeight: 1.45 }}>{p.text}</div>
    </div>)}
  </div>;
}

function SectionLabel({ children }) {
  return <div style={{ fontFamily: 'var(--font-sans)', fontSize: 'var(--text-label-size)', fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase', color: 'var(--text-tertiary)', marginBottom: '10px' }}>{children}</div>;
}

function DrawerBody({ state }) {
  if (state === 'confirmacion') {
    return <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: '16px', padding: '48px 8px' }}>
      <span style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--success-50)', color: 'var(--success-600)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name='checkCircle' size={34} /></span>
      <div>
        <h3 style={{ margin: 0, fontFamily: 'var(--font-sans)', fontSize: 'var(--text-h3-size)', fontWeight: 700, color: 'var(--text-primary)' }}>El pedido fue enviado</h3>
        <p style={{ margin: '8px 0 0', fontFamily: 'var(--font-sans)', fontSize: 'var(--text-body-size)', color: 'var(--text-secondary)', lineHeight: 1.55 }}>{CASO.name} va a recibir una notificación por email y podrá responder el pedido desde su cuenta.</p>
      </div>
    </div>;
  }
  const items = state === 'primer' ? [] : HIST;
  const draft = state === 'cargando' ? DRAFT : undefined;
  return <div style={{ display: 'flex', flexDirection: 'column', gap: '22px' }}>
    <div>
      <SectionLabel>Pedidos anteriores</SectionLabel>
      <Historial items={items} />
    </div>
    <div>
      <Textarea label='¿Qué necesitás del damnificado?' required rows={5} maxLength={500} showCount placeholder='Ej: Necesito el acta policial de la denuncia y dos fotos del daño visible del vehículo.' defaultValue={draft} disabled={state === 'cargando'} />
    </div>
  </div>;
}

function DrawerScene({ state, label }) {
  const loading = state === 'cargando';
  const footer = state === 'confirmacion'
    ? <Button variant='primary' iconLeft={<Icon name='arrowLeft' size={15} />}>Volver a la ficha</Button>
    : <React.Fragment>
        <Button variant='ghost'>Cancelar</Button>
        <Button variant='primary' loading={loading} iconLeft={loading ? null : <Icon name='send' size={15} />}>{loading ? 'Enviando…' : 'Enviar pedido'}</Button>
      </React.Fragment>;
  const title = <span>Solicitar documentación<span style={{ display: 'block', fontSize: '12px', fontWeight: 500, color: 'var(--text-tertiary)', fontFamily: 'var(--font-mono)', marginTop: '2px' }}>{CASO.name} · {CASO.id}</span></span>;
  return <div className='proto-item' style={{ width: '1280px', alignItems: 'stretch' }}>
    <div className='proto-label'>{label}<span className='tag'>drawer 480</span></div>
    <div className='browser'>
      <div className='browser-bar'><span className='browser-dot' style={{ background: '#E5695B' }}></span><span className='browser-dot' style={{ background: '#E8B84B' }}></span><span className='browser-dot' style={{ background: '#5FBE7E' }}></span><span className='browser-url'>app.amparo.ar/agente/casos/{CASO.id}/solicitar</span></div>
      <div className='browser-screen' style={{ height: '720px' }}>
        <div style={{ position: 'relative', height: '100%', overflow: 'hidden' }}>
          <BackdropFicha />
          <Drawer inline open title={title} onClose={() => {}} width={480} footer={footer}><DrawerBody state={state} /></Drawer>
        </div>
      </div>
    </div>
  </div>;
}

function App() {
  return <Canvas eyebrow='REC-58 · Agente' title='Solicitar documentación' sub='Drawer lateral de 480px sobre la ficha del caso. El agente pide información específica al damnificado desde el sistema; el historial evita repetir pedidos y el envío dispara una notificación por email. Elimina la dependencia de WhatsApp/email.'>
    <DrawerScene state='primer' label='Sin pedidos anteriores' />
    <DrawerScene state='historial' label='Con historial (respondido + pendiente)' />
    <DrawerScene state='cargando' label='Enviando' />
    <DrawerScene state='confirmacion' label='Confirmación post-envío' />
  </Canvas>;
}

mount(<App />);
</script>
</body>
</html>
